apiVersion: v1
kind: ConfigMap
metadata:
  name: aibrix-multi-modality-chat-config
  labels:
    app.kubernetes.io/name: aibrix-multi-modality-chat
data:
  gateway-url: "http://aibrix-gateway.aibrix-system.svc.cluster.local:8888"
  auth-mode: "none"
---
apiVersion: v1
kind: Secret
metadata:
  name: aibrix-multi-modality-chat-secret
  labels:
    app.kubernetes.io/name: aibrix-multi-modality-chat
type: Opaque
stringData:
  api-key: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aibrix-multi-modality-chat
  labels:
    app.kubernetes.io/name: aibrix-multi-modality-chat
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aibrix-multi-modality-chat
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aibrix-multi-modality-chat
    spec:
      containers:
        - name: chat
          image: aibrix-multi-modality-chat:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            - name: AIBRIX_GATEWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: aibrix-multi-modality-chat-config
                  key: gateway-url
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: aibrix-multi-modality-chat-secret
                  key: api-key
                  optional: true
            - name: AUTH_MODE
              valueFrom:
                configMapKeyRef:
                  name: aibrix-multi-modality-chat-config
                  key: auth-mode
            - name: CORS_ORIGINS
              value: "*"
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: aibrix-multi-modality-chat
  labels:
    app.kubernetes.io/name: aibrix-multi-modality-chat
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aibrix-multi-modality-chat
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http
