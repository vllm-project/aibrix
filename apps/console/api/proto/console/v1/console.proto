syntax = "proto3";

package console.v1;

option go_package = "github.com/vllm-project/aibrix/apps/console/api/gen/console/v1;consolev1";

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

// =============================================================================
// Deployment Service
// =============================================================================

service DeploymentService {
  rpc ListDeployments(ListDeploymentsRequest) returns (ListDeploymentsResponse) {
    option (google.api.http) = {
      get: "/api/v1/deployments"
    };
  }

  rpc GetDeployment(GetDeploymentRequest) returns (Deployment) {
    option (google.api.http) = {
      get: "/api/v1/deployments/{id}"
    };
  }

  rpc CreateDeployment(CreateDeploymentRequest) returns (Deployment) {
    option (google.api.http) = {
      post: "/api/v1/deployments"
      body: "*"
    };
  }

  rpc DeleteDeployment(DeleteDeploymentRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/deployments/{id}"
    };
  }
}

message Deployment {
  string id = 1;
  string name = 2;
  string deployment_id = 3;
  string base_model = 4;
  string base_model_id = 5;
  string replicas = 6;
  int32 gpus_per_replica = 7;
  string gpu_type = 8;
  string region = 9;
  string created_by = 10;
  string status = 11; // "Ready", "Deploying", "Failed"
  string template_id = 12;
  string template_version = 13;
  string implementation_kind = 14; // "kubernetes", "stormservice"
}

message ListDeploymentsRequest {
  string search = 1;
}

message ListDeploymentsResponse {
  repeated Deployment deployments = 1;
}

message GetDeploymentRequest {
  string id = 1;
}

message CreateDeploymentRequest {
  string name = 1;
  string base_model = 2;
  string region = 3;
  string accelerator_type = 4;
  int32 accelerator_count = 5;
  string quantization = 6;
  int32 min_replicas = 7;
  int32 max_replicas = 8;
  bool enable_auto_scaling = 9;
  bool enable_multi_lora = 10;
  DeploymentTemplateRef template = 11;
  DeploymentImplementationRef implementation = 12;
  DeploymentOverrides overrides = 13;
}

message DeploymentTemplateRef {
  string model_id = 1;
  string template_id = 2;
}

message DeploymentImplementationRef {
  string kind = 1; // "kubernetes", "stormservice"
  string profile = 2;
}

message DeploymentOverrides {
  string region = 1;
  int32 min_replicas = 2;
  int32 max_replicas = 3;
  bool enable_auto_scaling = 4;
  bool enable_multi_lora = 5;
  map<string, string> engine_args = 6;
}

message DeleteDeploymentRequest {
  string id = 1;
}

// =============================================================================
// Job Service (Batch Inference)
//
// Job is the Console product abstraction over OpenAI Batch — a superset that
// exposes every OpenAI Batch field plus Console-owned fields (name,
// created_by, ...). The JobService handler proxies to the metadata service
// /v1/batches API and aggregates the OpenAI Batch response with Console-side
// fields persisted in the store.
// =============================================================================

service JobService {
  rpc ListJobs(ListJobsRequest) returns (ListJobsResponse) {
    option (google.api.http) = {
      get: "/api/v1/jobs"
    };
  }

  rpc GetJob(GetJobRequest) returns (Job) {
    option (google.api.http) = {
      get: "/api/v1/jobs/{id}"
    };
  }

  rpc CreateJob(CreateJobRequest) returns (Job) {
    option (google.api.http) = {
      post: "/api/v1/jobs"
      body: "*"
    };
  }

  rpc CancelJob(CancelJobRequest) returns (Job) {
    option (google.api.http) = {
      post: "/api/v1/jobs/{id}/cancel"
      body: "*"
    };
  }
}

message Job {
  // Identity
  string id = 1;
  string object = 2;             // mirrors OpenAI's "batch"

  // Configuration. Console-side names; the handler maps input_dataset /
  // output_dataset / error_dataset to OpenAI's input_file_id / output_file_id /
  // error_file_id when calling the metadata service.
  string endpoint = 3;
  string model = 4;
  string input_dataset = 5;
  string completion_window = 6;
  // Console-facing job status: one of the 13 plannerapi.JobStatus values.
  // - pre-submit (queued / resource_preparing / submitting)
  // - post-submit mirrors of openai.batch.status
  string status = 7;
  string output_dataset = 8;
  string error_dataset = 9;

  // Unix-second timestamps
  int64 created_at = 10;
  int64 in_progress_at = 11;
  int64 expires_at = 12;
  int64 finalizing_at = 13;
  int64 completed_at = 14;
  int64 failed_at = 15;
  int64 expired_at = 16;
  int64 cancelling_at = 17;
  int64 cancelled_at = 18;
  JobRequestCounts request_counts = 19;
  JobUsage usage = 20;
  map<string, string> metadata = 21;
  // Raw extension payloads carried through OpenAI SDK extra_body. Values are
  // compact JSON strings keyed by extension namespace, for example
  // extra_body["aibrix"].
  map<string, string> extra_body = 22;
  repeated JobError errors = 23;
  JobRuntime runtime = 24;
  JobResourceAllocation resource_allocation = 25;
  JobModelTemplateRef model_template_ref = 26;
  JobProfileRef profile = 27;

  // Console-owned fields (persisted in the store)
  string name = 100;             // display name; resolved from metadata.display_name
  string created_by = 101;       // Console user that created the job
  // Resolved deployment-template binding. Populated from the user's
  // template selection in the create-job flow; empty for legacy jobs and
  // SDK-path jobs that pin templates through extra_body.aibrix instead.
  string model_template_name = 102;
  string model_template_version = 103;
  string batch_id = 104;          // MDS/OpenAI batch id when different from Console job id
  string provision_id = 105;      // Resource-manager provision id
  string error_message = 106;     // Planner/provision/submit error summary
  int64 queued_at = 107;
  int64 resource_preparing_at = 108;
  int64 submitting_at = 109;
  int64 resource_failed_at = 110;
  int64 submit_failed_at = 111;
  int64 cancel_requested_at = 112;
  JobProvision provision = 113;
  repeated JobEvent events = 114;
}

message JobRequestCounts {
  int32 total = 1;
  int32 completed = 2;
  int32 failed = 3;
}

message JobUsage {
  int64 input_tokens = 1;
  int64 output_tokens = 2;
  int64 total_tokens = 3;
}

message JobError {
  string code = 1;
  string message = 2;
  string param = 3;
  int64 line = 4;
}

message JobRuntime {
  string target = 1;
  map<string, string> options = 2;
  string raw_json = 100;
}

message JobResourceAllocation {
  string provision_id = 1;
  int64 provision_resource_deadline = 2;
  repeated JobResourceDetail resource_details = 3;
  string raw_json = 100;
}

message JobResourceDetail {
  string endpoint_cluster = 1;
  string gpu_type = 2;
  int32 replica = 3;
  map<string, string> extra = 100;
}

message JobModelTemplateRef {
  string name = 1;
  string version = 2;
  string raw_json = 100;
}

message JobProfileRef {
  string name = 1;
  string raw_json = 100;
}

message JobProvision {
  string provision_id = 1;
  string provider = 2;
  string idempotency_key = 3;
  string status = 4;
  string region = 5;
  string error_message = 6;
  int64 created_at = 7;
  int64 updated_at = 8;
  string raw_json = 100;
}

message JobEvent {
  string id = 1;
  string label = 2;
  string status = 3;
  string source = 4;
  int64 at = 5;
  string message = 6;
}

message ListJobsRequest {
  string after = 1;              // pagination cursor (metadata service)
  int32 limit = 2;
}

message ListJobsResponse {
  repeated Job jobs = 1;
  string first_id = 2;
  string last_id = 3;
  bool has_more = 4;
}

message GetJobRequest {
  string id = 1;
}

message CreateJobRequest {
  string input_dataset = 1;      // Console naming; handler maps to OpenAI input_file_id
  string endpoint = 2;           // e.g. /v1/chat/completions
  string completion_window = 3;  // e.g. "24h"
  string name = 4;               // display name (stored in metadata.display_name)

  // ModelDeploymentTemplate binding. Required for new jobs created via the
  // console UI (the wizard picks a template after the model); the SDK path
  // remains free to omit them and rely on metadata-service-side resolution
  // through extra_body.aibrix.model_template.
  string model_template_name = 5;
  string model_template_version = 6;  // optional; "" = latest active

  // Model the template is resolved under. Template names are only unique
  // per (model_id, name, version)
  string model_id = 7;

  // Request counts computed by frontend (e.g., counting JSONL lines).
  // Passed through to planner and persisted for display before MDS processes.
  int32 request_count_total = 8;

  // Per-job error injection configuration. Optional.
  // When provided, enables targeted error injection for this specific job.
  InjectionConfig injection_config = 9;

  // Resource intent supplied by the console UI. The planner projects this into
  // resource-manager requests and later records the final allocation in
  // extra_body.aibrix.resource_allocation.
  JobResourceRequest resource_request = 14;

  // Per-job smart-client controls (concurrency + retry). Projected into
  // extra_body.aibrix.client. All fields optional; omitted ones fall back to
  // metadata-service env defaults.
  JobClientConfig client = 15;

  // Fields 10..13 (max_tokens / temperature / top_p / n) were removed:
  // the console wizard bakes per-batch sampling params into the uploaded
  // JSONL itself, so there's nothing for the BFF to forward. The OpenAI
  // SDK path can still POST them to MDS directly.
  reserved 10, 11, 12, 13;
  reserved "max_tokens", "temperature", "top_p", "n";
}

message JobResourceRequest {
  int32 replicas = 1;
}

// JobClientConfig mirrors the metadata-service aibrix.client block. Optional
// fields use proto3 presence so "unset" (fall back to env defaults) is
// distinguishable from an explicit zero.
message JobClientConfig {
  optional int32 max_concurrency = 1;       // absolute in-flight cap, 1..256
  optional bool adaptive_concurrency = 2;   // grow concurrency adaptively
  optional double adaptive_max_factor = 3;  // adaptive growth factor, >= 1
  JobClientRetryPolicy retry_policy = 4;
}

message JobClientRetryPolicy {
  optional int32 max_retries = 1;             // per-request retries, >= 0
  optional double base_delay_seconds = 2;     // backoff base, >= 0
  optional double max_delay_seconds = 3;      // backoff ceiling, >= 0
  optional int32 no_endpoint_max_retries = 4; // retries while no endpoint, >= 0
}

// InjectionConfig specifies per-job error injection behavior.
message InjectionConfig {
  bool enabled = 1;
  repeated InjectionRule rules = 2;
  double global_probability = 3;
}

message CancelJobRequest {
  string id = 1;
}

// =============================================================================
// Model Service (Catalog)
// =============================================================================

service ModelService {
  rpc ListModels(ListModelsRequest) returns (ListModelsResponse) {
    option (google.api.http) = {
      get: "/api/v1/models"
    };
  }

  rpc GetModel(GetModelRequest) returns (Model) {
    option (google.api.http) = {
      get: "/api/v1/models/{id}"
    };
  }

  rpc CreateModel(CreateModelRequest) returns (Model) {
    option (google.api.http) = {
      post: "/api/v1/models"
      body: "*"
    };
  }
}

message Model {
  string id = 1;
  string name = 2;
  string icon_bg = 3;
  string icon_text = 4;
  string icon_text_color = 5;
  repeated string categories = 6; // "LLM", "Audio", "Image", "Video", "Vision", "Embedding", "Reranks"
  bool is_new = 7;
  ModelPricing pricing = 8;
  string context_length = 9;
  string description = 10;
  ModelMetadata metadata = 11;
  ModelSpecification specification = 12;
  repeated string tags = 13;
  // serving_name is the identifier callers must put in `body.model` for
  // batch / online inference (typically the HuggingFace path or the vLLM
  // `--served-model-name` value). Distinct from `id` (Console-internal
  // primary key) and `name` (human-readable display). Empty means the model
  // isn't deployed yet — clients should skip server-side identifier checks.
  string serving_name = 14;
}

message ModelPricing {
  string uncached_input = 1;     // also covers embeddings (formerly per_tokens)
  string cached_input = 2;
  string output = 3;
  string per_minute = 4;         // audio (e.g. Whisper)
  string per_image = 5;          // formerly per_ea — image generation
}

message ModelMetadata {
  string state = 1;
  string created_on = 2;
  string provider_name = 3;
  string hugging_face = 4;
}

message ModelSpecification {
  bool calibrated = 1;
  bool mixture_of_experts = 2;
  string parameters = 3;
}

message ListModelsRequest {
  string search = 1;
  string category = 2;
}

message ListModelsResponse {
  repeated Model models = 1;
}

message GetModelRequest {
  string id = 1;
}

// CreateModelRequest creates a catalog entry. `id` is optional — when empty
// the server derives one from `name` (kebab-case, prefixed with "model-").
// `categories` and `serving_name` should be set if the model is meant to be
// usable for batch / online inference; otherwise it appears in the catalog
// but selection paths that filter on category may skip it.
message CreateModelRequest {
  string id = 1;                       // optional; server derives from name when empty
  string name = 2;                     // required, human-readable
  string icon_bg = 3;
  string icon_text = 4;
  string icon_text_color = 5;
  repeated string categories = 6;      // see Model.categories for valid values
  bool is_new = 7;
  ModelPricing pricing = 8;
  string context_length = 9;
  string description = 10;
  ModelMetadata metadata = 11;
  ModelSpecification specification = 12;
  repeated string tags = 13;
  string serving_name = 14;            // required for runnable models
}

// =============================================================================
// Model Deployment Template Service
//
// Identity model:
//   - Each template has a server-assigned UUID `id` (stable, addressable).
//   - The (model_id, name, version) tuple is unique and is the human-friendly
//     handle used by clients that pin a known template. Multiple versions of
//     the same `name` may coexist; `status` selects which is active.
//   - "Latest active" for a (model_id, name) pair = highest SemVer-ish version
//     with status == "active".
//
// Resolve vs Get:
//   - Get is by UUID — used by the console UI after navigating from a list.
//   - ResolveModelDeploymentTemplate is by (name, version?) — used by clients
//     that pin templates from outside the UI (e.g. batch SDK callers passing
//     model_template + model_template_version in extra_body.aibrix). Server
//     picks "latest active" when version is empty.
//
// -----------------------------------------------------------------------------
// Batch SDK contract
// -----------------------------------------------------------------------------
// Batch jobs reference templates and profiles via OpenAI's extra_body. The
// Python metadata service (python/aibrix/aibrix/metadata/api/v1/batch.py)
//
//   client.batches.create(
//       input_file_id="file-...",
//       endpoint="/v1/chat/completions",
//       completion_window="24h",
//       extra_body={
//           "aibrix": {
//               "model": "Qwen/Qwen3.5-32B",       # serving_name; see rules below
//               "runtime": {
//                   "target": "Kubernetes",        # registered MDS runtime target
//                   "options": {"namespace": "default"}  # optional, runtime-owned
//               },
//               "resource_allocation": {
//                   "provision_id": "reservation-1",
//                   "resource_details": []          # optional planner/RM payload
//               },
//               "model_template": {
//                   "name":    "llama3-70b-prod",   # required
//                   "version": "v1.3.0",            # optional; "" = latest active
//                   "overrides": {                  # optional, allowlisted patches
//                       "engine_args": {"max_num_seqs": "512"}
//                   }
//               },
//               "profile": {
//                   "name": "prod-24h",             # required
//                   "overrides": {                  # optional
//                       "scheduling": {"max_concurrency": 32}
//                   }
//               },
//               "client": {                         # optional smart-client controls
//                   "max_concurrency": 256,          # optional job-global cap, 1..256
//                   "adaptive_concurrency": true,    # optional
//                   "adaptive_max_factor": 16,       # optional, >= 1
//                   "retry_policy": {                # optional
//                       "max_retries": 5,            # optional, >= 0
//                       "base_delay_seconds": 2,     # optional, >= 0
//                       "max_delay_seconds": 10,     # optional, >= 0
//                       "no_endpoint_max_retries": 5 # optional, >= 0
//                   }
//               }
//           }
//       }
//   )
//
//
// rules:
//   - model is the serving identifier (the catalog model's serving_name) that
//     the batch's body.model carries. MDS echoes it as Batch.model and pins the
//     engine's --served-model-name to it. Optional; when absent the engine
//     serves under the template's model_source.uri and Batch.model falls back
//     to model_template.name.
//   - runtime.target selects the MDS Runtime. runtime.options is free-form and
//     owned by the selected runtime; do not introduce runtime.placement.
//   - resource_allocation carries generic planner / resource-manager output.
//     resource_details remains a backend-defined array and is not renamed to
//     placement.
//   - model_template.name is required when extra_body.aibrix.model_template
//     is present.
//   - model_template.version: empty string -> latest active version of that
//     name; explicit value -> exact match (404 if missing).
//   - model_template.overrides is optional and ALLOWLISTED. Allowlist today:
//     {engine_args}. Anything else is rejected with 400. New keys are added
//     here only after a proven need; the proto comment is the source of
//     truth — implementations MUST reject unknown keys, not silently ignore.
//   - profile.name is required when extra_body.aibrix.profile is present.
//   - profile.overrides is optional and ALLOWLISTED. Allowlist today:
//     {scheduling}. Same rejection rule as above.
//   - client controls per-job smart-client behavior only. It does not expose
//     telemetry/logging interval, QPS, request timeout, or fine-grained adaptive
//     controller internals.
//   - client.max_concurrency is an absolute job-global in-flight cap, hard
//     limited to 256 (requests above are rejected). When adaptive_concurrency
//     is true, it caps adaptive growth. When adaptive_concurrency is false, it
//     is the fixed concurrency. If omitted, adaptive jobs keep the
//     source.capacity * adaptive_max_factor upper bound, and fixed jobs use
//     source.capacity.
//   - client.retry_policy fields override cluster env defaults field by field;
//     omitted fields continue to fall back to env vars and then built-in
//     defaults.
//   - When extra_body.aibrix is omitted entirely, the metadata service uses
//     its configured default profile and rejects the request if no template
//     can be inferred from the request `model` field.
// -----------------------------------------------------------------------------
//
// TODO: This schema duplicates python/aibrix/aibrix/batch/template/schema.py
// (ModelDeploymentTemplate, EngineSpec, ModelSourceSpec, AcceleratorSpec,
// ParallelismSpec, EngineArgsSpec, QuantizationSpec). The
// duplication is intentional for now — console owns the user-facing surface
// while batch already has runtime usage. Once both sides settle, fold into a
// single source-of-truth (likely a CRD generated from one schema).
// =============================================================================

service ModelDeploymentTemplateService {
  rpc ListModelDeploymentTemplates(ListModelDeploymentTemplatesRequest) returns (ListModelDeploymentTemplatesResponse) {
    option (google.api.http) = {
      get: "/api/v1/models/{model_id}/deployment-templates"
    };
  }

  rpc GetModelDeploymentTemplate(GetModelDeploymentTemplateRequest) returns (ModelDeploymentTemplate) {
    option (google.api.http) = {
      get: "/api/v1/models/{model_id}/deployment-templates/{id}"
    };
  }

  rpc CreateModelDeploymentTemplate(CreateModelDeploymentTemplateRequest) returns (ModelDeploymentTemplate) {
    option (google.api.http) = {
      post: "/api/v1/models/{model_id}/deployment-templates"
      body: "*"
    };
  }

  rpc UpdateModelDeploymentTemplate(UpdateModelDeploymentTemplateRequest) returns (ModelDeploymentTemplate) {
    option (google.api.http) = {
      put: "/api/v1/models/{model_id}/deployment-templates/{id}"
      body: "*"
    };
  }

  rpc DeleteModelDeploymentTemplate(DeleteModelDeploymentTemplateRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/models/{model_id}/deployment-templates/{id}"
    };
  }

  // Resolve looks up a template by (model_id, name, version). When `version`
  // is empty, the server returns the latest active version of that name.
  // 404 if no template matches; 409 if name has versions but none are active
  // and version was not specified.
  rpc ResolveModelDeploymentTemplate(ResolveModelDeploymentTemplateRequest) returns (ModelDeploymentTemplate) {
    option (google.api.http) = {
      get: "/api/v1/models/{model_id}/deployment-templates/by-name/{name}"
    };
  }
}

message ModelDeploymentTemplate {
  string id = 1;                          // server-assigned UUID
  string name = 2;                        // logical name, e.g. "llama3-70b-prod"
  string version = 3;                     // SemVer-ish, default "v1.0.0"
  string status = 4;                      // "active" | "deprecated" | "draft"
  string model_id = 5;                    // required — links template to a Model
  ModelDeploymentTemplateSpec spec = 6;
  string created_at = 7;
  string updated_at = 8;
}

message ModelDeploymentTemplateSpec {
  EngineSpec engine = 1;
  ModelSourceSpec model_source = 2;
  AcceleratorSpec accelerator = 3;
  ParallelismSpec parallelism = 4;
  // Free-form key/value engine knobs. Keys map directly to engine flags
  // (e.g. "max_num_seqs", "gpu_memory_utilization"); values are strings so
  // the wire format stays engine-agnostic — the renderer parses each value
  // when materializing the engine command line.
  //
  // Why a map rather than typed fields: vLLM / SGLang / TRT-LLM expose
  // dozens of flags that change every release; modeling each as its own
  // proto field turns the schema into a maintenance treadmill and forces
  // a superset that is meaningless for half of the engines. The console UI
  // ships a curated list of "known knobs" client-side (autocomplete + typed
  // inputs) decoupled from the wire format.
  map<string, string> engine_args = 5;
  QuantizationSpec quantization = 6;
  // Field 7 (provider_config) was removed — Template stays provider-agnostic;
  // K8s defaults live in MDS renderer, multi-provider arbitration belongs to
  // BatchProfile.scheduling.
  reserved 7;
  reserved "provider_config";
  repeated string supported_endpoints = 8;   // OpenAI endpoints, e.g. "/v1/chat/completions"
  string deployment_mode = 9;                 // "dedicated" | "shared" | "external"
}

message EngineSpec {
  string type = 1;                        // "vllm" | "sglang" | "trtllm" | "lmdeploy" | "mock"
  string version = 2;
  string image = 3;
  string invocation = 4;                  // "http_server"
  repeated string serve_args = 5;
  string health_endpoint = 6;
  int32 ready_timeout_seconds = 7;
  string metrics_endpoint = 8;
}

message ModelSourceSpec {
  string type = 1;                        // "huggingface" | "s3" | "local"
  string uri = 2;
  string revision = 3;
  string tokenizer_path = 4;
  string chat_template_path = 5;
  string auth_secret_ref = 6;
}

message AcceleratorSpec {
  string type = 1;                        // free-form GPU SKU label, "cpu" treated specially
  int32 count = 2;
  string interconnect = 3;                // "nvlink" | "pcie" | "ib"
  int32 vram_gb = 4;
  string sku_hint = 5;                    // e.g. "aws/p5.48xlarge"
}

message ParallelismSpec {
  int32 tp = 1;
  int32 pp = 2;
  int32 dp = 3;
  int32 ep = 4;
  int32 sp = 5;
  int32 cp = 6;
}

message QuantizationSpec {
  string weight = 1;                      // "fp8" | "awq" | "gptq" | "int8" | "bf16" | "fp16"
  string kv_cache = 2;                    // "auto" | "fp8" | "fp8_e4m3" | "fp8_e5m2" | "int8"
  string weights_artifact_uri = 3;
}

message ListModelDeploymentTemplatesRequest {
  string model_id = 1;                    // required path param
  string status = 2;                      // optional filter — "active" | "deprecated" | "draft"
  string name = 3;                        // optional filter — list all versions of a given name
}

message ListModelDeploymentTemplatesResponse {
  repeated ModelDeploymentTemplate templates = 1;
}

message GetModelDeploymentTemplateRequest {
  string model_id = 1;                    // required path param
  string id = 2;
}

message CreateModelDeploymentTemplateRequest {
  string model_id = 1;                    // required path param
  string name = 2;
  string version = 3;                     // optional, defaults to "v1.0.0"
  string status = 4;                      // optional, defaults to "active"
  ModelDeploymentTemplateSpec spec = 5;
}

message UpdateModelDeploymentTemplateRequest {
  string model_id = 1;                    // required path param
  string id = 2;
  string name = 3;
  string version = 4;
  string status = 5;
  ModelDeploymentTemplateSpec spec = 6;
}

message DeleteModelDeploymentTemplateRequest {
  string model_id = 1;                    // required path param
