// =============================================================================
// Error Injection Service
//
// Error injection allows controlled injection of errors into the batch pipeline
// for testing chaos engineering and debugging. The service provides:
// - ListInjectionPoints: discover all registered injection points
// - GetInjectionConfig: read the global injection configuration
// - SetInjectionConfig: update the global injection configuration
// - ClearInjectionConfig: disable all injection (reset to empty config)
// - GetInjectionTrace: retrieve execution trace for a specific job
// =============================================================================

service InjectionService {
  rpc ListInjectionPoints(ListInjectionPointsRequest) returns (ListInjectionPointsResponse) {
    option (google.api.http) = {
      get: "/api/v1/injection/points"
    };
  }

  rpc GetInjectionConfig(GetInjectionConfigRequest) returns (GetInjectionConfigResponse) {
    option (google.api.http) = {
      get: "/api/v1/injection/config"
    };
  }

  rpc SetInjectionConfig(SetInjectionConfigRequest) returns (SetInjectionConfigResponse) {
    option (google.api.http) = {
      post: "/api/v1/injection/config"
      body: "*"
    };
  }

  rpc ClearInjectionConfig(ClearInjectionConfigRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/injection/config"
    };
  }

  rpc GetInjectionTrace(GetInjectionTraceRequest) returns (GetInjectionTraceResponse) {
    option (google.api.http) = {
      get: "/api/v1/injection/traces/{job_id}"
    };
  }
}

// ErrorType represents the category of error to inject.
enum ErrorType {
  ERROR_TYPE_UNSPECIFIED = 0;
  ERROR_TYPE_TIMEOUT = 1;
  ERROR_TYPE_UNAVAILABLE = 2;
  ERROR_TYPE_INVALID_ARGUMENT = 3;
  ERROR_TYPE_NOT_FOUND = 4;
  ERROR_TYPE_PERMISSION_DENIED = 5;
  ERROR_TYPE_RESOURCE_EXHAUSTED = 6;
  ERROR_TYPE_INTERNAL = 7;
  ERROR_TYPE_CRASH = 8;
}

// InjectionTemplate defines a template for generating specific error types.
message InjectionTemplate {
  ErrorType type = 1;
  string code = 2;
  string message_template = 3;
  map<string, string> placeholders = 4;
  map<string, string> details_template = 5;
}

// InjectionPoint represents a specific point in the pipeline where errors can be injected.
message InjectionPoint {
  string id = 1;                          // unique identifier "component.action"
  string component = 2;                   // pipeline component name
  string action = 3;                      // specific operation within the component
  string description = 4;                 // human-readable explanation
  map<string, InjectionTemplate> templates = 5;  // pre-defined error templates keyed by ErrorType name
}

// InjectionRule defines a rule for injecting errors at specific points.
message InjectionRule {
  string point_ref = 1;                   // injection point ID or wildcard pattern
  ErrorType error_type = 2;               // which template to use
  double probability = 3;                 // chance (0.0-1.0) that error triggers
  map<string, string> overrides = 4;      // customization of template placeholder values
}

// InjectedError represents an error that was injected into the pipeline.
message InjectedError {
  ErrorType type = 1;
  string code = 2;
  string message = 3;
  map<string, string> details = 4;
}

// GlobalInjectionConfig contains global error injection settings.
message GlobalInjectionConfig {
  bool enabled = 1;
  repeated InjectionRule rules = 2;
  repeated string excluded_points = 3;
  double global_probability = 4;              // default probability for all points in chaos mode
  map<string, double> point_weights = 5;      // per-point probability overrides (point_id -> probability)
}

// PointRecord tracks the execution and outcome of an injection point evaluation.
message PointRecord {
  string point_id = 1;
  int64 timestamp = 2;                    // unix seconds
  bool triggered = 3;
  map<string, string> context_snapshot = 4;
  InjectedError error = 5;
  ErrorType template_used = 6;
  map<string, string> overrides_applied = 7;
  double probability_roll = 8;
}

// ExecutionTrace captures the complete trace of error injection for a job execution.
message ExecutionTrace {
  string job_id = 1;
  int64 start_time = 2;                   // unix seconds
  int64 end_time = 3;                     // unix seconds
  repeated PointRecord points = 4;
}

// Request/Response messages for InjectionService RPCs

message ListInjectionPointsRequest {}

message ListInjectionPointsResponse {
  repeated InjectionPoint points = 1;
}

message GetInjectionConfigRequest {}

message GetInjectionConfigResponse {
  GlobalInjectionConfig config = 1;
}

message SetInjectionConfigRequest {
  GlobalInjectionConfig config = 1;
}

message SetInjectionConfigResponse {
  GlobalInjectionConfig config = 1;
}

message ClearInjectionConfigRequest {}

message GetInjectionTraceRequest {
  string job_id = 1;
}

message GetInjectionTraceResponse {
  ExecutionTrace trace = 1;
}
