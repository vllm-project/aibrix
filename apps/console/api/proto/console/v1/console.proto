syntax = "proto3";

package console.v1;

option go_package = "github.com/vllm-project/aibrix/apps/console/api/gen/console/v1;consolev1";

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

// =============================================================================
// Deployment Service
// =============================================================================

service DeploymentService {
  rpc ListDeployments(ListDeploymentsRequest) returns (ListDeploymentsResponse) {
    option (google.api.http) = {
      get: "/api/v1/deployments"
    };
  }

  rpc GetDeployment(GetDeploymentRequest) returns (Deployment) {
    option (google.api.http) = {
      get: "/api/v1/deployments/{id}"
    };
  }

  rpc CreateDeployment(CreateDeploymentRequest) returns (Deployment) {
    option (google.api.http) = {
      post: "/api/v1/deployments"
      body: "*"
    };
  }

  rpc DeleteDeployment(DeleteDeploymentRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/deployments/{id}"
    };
  }
}

message Deployment {
  string id = 1;
  string name = 2;
  string deployment_id = 3;
  string base_model = 4;
  string base_model_id = 5;
  string replicas = 6;
  int32 gpus_per_replica = 7;
  string gpu_type = 8;
  string region = 9;
  string created_by = 10;
  string status = 11; // "Ready", "Deploying", "Failed"
}

message ListDeploymentsRequest {
  string search = 1;
}

message ListDeploymentsResponse {
  repeated Deployment deployments = 1;
}

message GetDeploymentRequest {
  string id = 1;
}

message CreateDeploymentRequest {
  string name = 1;
  string base_model = 2;
  string region = 3;
  string accelerator_type = 4;
  int32 accelerator_count = 5;
  string quantization = 6;
  int32 min_replicas = 7;
  int32 max_replicas = 8;
  bool enable_auto_scaling = 9;
  bool enable_multi_lora = 10;
}

message DeleteDeploymentRequest {
  string id = 1;
}

// =============================================================================
// Job Service (Batch Inference)
//
// Job is the Console product abstraction over OpenAI Batch — a superset that
// exposes every OpenAI Batch field plus Console-owned fields (name,
// created_by, ...). The JobService handler proxies to the metadata service
// /v1/batches API and aggregates the OpenAI Batch response with Console-side
// fields persisted in the store.
// =============================================================================

service JobService {
  rpc ListJobs(ListJobsRequest) returns (ListJobsResponse) {
    option (google.api.http) = {
      get: "/api/v1/jobs"
    };
  }

  rpc GetJob(GetJobRequest) returns (Job) {
    option (google.api.http) = {
      get: "/api/v1/jobs/{id}"
    };
  }

  rpc CreateJob(CreateJobRequest) returns (Job) {
    option (google.api.http) = {
      post: "/api/v1/jobs"
      body: "*"
    };
  }

  rpc CancelJob(CancelJobRequest) returns (Job) {
    option (google.api.http) = {
      post: "/api/v1/jobs/{id}/cancel"
      body: "*"
    };
  }
}

message Job {
  // Identity
  string id = 1;
  string object = 2;             // mirrors OpenAI's "batch"

  // Configuration. Console-side names; the handler maps input_dataset /
  // output_dataset / error_dataset to OpenAI's input_file_id / output_file_id /
  // error_file_id when calling the metadata service.
  string endpoint = 3;
  string model = 4;
  string input_dataset = 5;
  string completion_window = 6;
  // 8-state OpenAI status:
  // validating | in_progress | finalizing | completed | failed | expired | cancelling | cancelled
  string status = 7;
  string output_dataset = 8;
  string error_dataset = 9;

  // Unix-second timestamps
  int64 created_at = 10;
  int64 in_progress_at = 11;
  int64 expires_at = 12;
  int64 finalizing_at = 13;
  int64 completed_at = 14;
  int64 failed_at = 15;
  int64 expired_at = 16;
  int64 cancelling_at = 17;
  int64 cancelled_at = 18;
  JobRequestCounts request_counts = 19;
  JobUsage usage = 20;
  map<string, string> metadata = 21;

  // Console-owned fields (persisted in the store)
  string name = 100;             // display name; resolved from metadata.display_name
  string created_by = 101;       // Console user that created the job
}

message JobRequestCounts {
  int32 total = 1;
  int32 completed = 2;
  int32 failed = 3;
}

message JobUsage {
  int64 input_tokens = 1;
  int64 output_tokens = 2;
  int64 total_tokens = 3;
}

message ListJobsRequest {
  string after = 1;              // pagination cursor (metadata service)
  int32 limit = 2;
}

message ListJobsResponse {
  repeated Job jobs = 1;
  string first_id = 2;
  string last_id = 3;
  bool has_more = 4;
}

message GetJobRequest {
  string id = 1;
}

message CreateJobRequest {
  string input_dataset = 1;      // Console naming; handler maps to OpenAI input_file_id
  string endpoint = 2;           // e.g. /v1/chat/completions
  string completion_window = 3;  // e.g. "24h"
  string name = 4;               // display name (stored in metadata.display_name)

  // Optional batch-wide inference parameter overrides. Currently NOT applied
  // by the handler — per-request values from the JSONL body take precedence.
  // Reserved here so the Console contract is stable; future versions will
  // route these into aibrix.overrides.engine_args.
  optional int32 max_tokens = 10;
  optional double temperature = 11;
  optional double top_p = 12;
  optional int32 n = 13;
}

message CancelJobRequest {
  string id = 1;
}

// =============================================================================
// Model Service (Catalog)
// =============================================================================

service ModelService {
  rpc ListModels(ListModelsRequest) returns (ListModelsResponse) {
    option (google.api.http) = {
      get: "/api/v1/models"
    };
  }

  rpc GetModel(GetModelRequest) returns (Model) {
    option (google.api.http) = {
      get: "/api/v1/models/{id}"
    };
  }
}

message Model {
  string id = 1;
  string name = 2;
  string provider = 3;
  string icon_bg = 4;
  string icon_text = 5;
  string icon_text_color = 6;
  repeated string categories = 7; // "LLM", "Audio", "Image", "Video", "Vision", "Embedding", "Reranks"
  bool is_new = 8;
  ModelPricing pricing = 9;
  string context_length = 10;
  string description = 11;
  ModelMetadata metadata = 12;
  ModelSpecification specification = 13;
  repeated string tags = 14;
}

message ModelPricing {
  string uncached_input = 1;
  string cached_input = 2;
  string output = 3;
  string per_minute = 4;
  string per_step = 5;
  string per_ea = 6;
  string per_tokens = 7;
}

message ModelMetadata {
  string state = 1;
  string created_on = 2;
  string kind = 3;
  string provider_name = 4;
  string hugging_face = 5;
}

message ModelSpecification {
  bool calibrated = 1;
  bool mixture_of_experts = 2;
  string parameters = 3;
}

message ListModelsRequest {
  string search = 1;
  string category = 2;
}

message ListModelsResponse {
  repeated Model models = 1;
}

message GetModelRequest {
  string id = 1;
}

// =============================================================================
// API Key Service
// =============================================================================

service APIKeyService {
  rpc ListAPIKeys(ListAPIKeysRequest) returns (ListAPIKeysResponse) {
    option (google.api.http) = {
      get: "/api/v1/apikeys"
    };
  }

  rpc CreateAPIKey(CreateAPIKeyRequest) returns (CreateAPIKeyResponse) {
    option (google.api.http) = {
      post: "/api/v1/apikeys"
      body: "*"
    };
  }

  rpc DeleteAPIKey(DeleteAPIKeyRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/apikeys/{id}"
    };
  }
}

message APIKey {
  string id = 1;
  string name = 2;
  string secret_key = 3; // masked after creation
  string created_at = 4;
}

message ListAPIKeysRequest {}

message ListAPIKeysResponse {
  repeated APIKey api_keys = 1;
}

message CreateAPIKeyRequest {
  string name = 1;
}

message CreateAPIKeyResponse {
  APIKey api_key = 1;
  string full_key = 2; // only returned once at creation
}

message DeleteAPIKeyRequest {
  string id = 1;
}

// =============================================================================
// Secret Service
// =============================================================================

service SecretService {
  rpc ListSecrets(ListSecretsRequest) returns (ListSecretsResponse) {
    option (google.api.http) = {
      get: "/api/v1/secrets"
    };
  }

  rpc CreateSecret(CreateSecretRequest) returns (Secret) {
    option (google.api.http) = {
      post: "/api/v1/secrets"
      body: "*"
    };
  }

  rpc DeleteSecret(DeleteSecretRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/secrets/{id}"
    };
  }
}

message Secret {
  string id = 1;
  string name = 2;
}

message ListSecretsRequest {
  string search = 1;
}

message ListSecretsResponse {
  repeated Secret secrets = 1;
}

message CreateSecretRequest {
  string name = 1;
  string value = 2;
}

message DeleteSecretRequest {
  string id = 1;
}

// =============================================================================
// Quota Service
// =============================================================================

service QuotaService {
  rpc ListQuotas(ListQuotasRequest) returns (ListQuotasResponse) {
    option (google.api.http) = {
      get: "/api/v1/quotas"
    };
  }
}

message Quota {
  string id = 1;
  string name = 2;
  string quota_id = 3;
  int32 current_usage = 4;
  double usage_percentage = 5;
  int32 quota = 6;
}

message ListQuotasRequest {
  string search = 1;
}

message ListQuotasResponse {
  repeated Quota quotas = 1;
}
