# AIBrix Gateway Endpoints Configuration (Local)
#
# Defines backend vLLM engines for the gateway to route to.
# Use real IP addresses or hostnames reachable from this machine.
#
# Simple mode: list endpoints directly
# P/D mode: use rolesets with prefill/decode workers

models:
  - name: "Qwen/Qwen3.5-4B"
    engine: "vllm"    # optional: vllm, sglang, trtllm
    endpoints:
      - "127.0.0.1:8000"

