# AIBrix Gateway Endpoints Configuration - P/D Disaggregation Mode
# This file defines separate prefill and decode engines grouped by roleset.
#
# Each roleset represents a group of prefill and decode workers that can be
# paired together (e.g., single node P/D leverage nvlink based kv transfer).
# The PD routing algorithm selects the roleset first and then best 
# prefill+decode pair within a roleset.
# Note: You do not need multiple rolesets in most of the case.
#
# NETWORKING:
# Uses hostnames that work for both Docker Compose and local development.
# For local dev, add to /etc/hosts: 127.0.0.1 gateway prefill-engine decode-engine metadata-service

models:
  - name: "Qwen/Qwen2.5-1.5B-Instruct"
    rolesets:
      - name: default
        prefill:
          - "prefill-engine:8000"
        decode:
          - "decode-engine:8000"
