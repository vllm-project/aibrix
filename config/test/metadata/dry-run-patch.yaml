apiVersion: apps/v1
kind: Deployment
metadata:
  name: aibrix-metadata-service
  namespace: aibrix-system
spec:
  template:
    spec:
      containers:
      - name: metadata-service
        command:
          - aibrix_metadata
          - --host
          - "0.0.0.0"
          - --port
          - "8090"
          - --dry-run
