name: Multimodality Chat App CI

on:
  workflow_dispatch:
  push:
    branches: ["main", "release-*"]
    paths:
      - "apps/chat/**"
      - ".github/workflows/apps-chat-ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "apps/chat/**"
      - ".github/workflows/apps-chat-ci.yml"

jobs:
  frontend-lint:
    name: Frontend Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/chat/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/chat/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .
