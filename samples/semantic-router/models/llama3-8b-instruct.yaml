apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama3-8b-instruct
  namespace: default
  labels:
    model.aibrix.ai/name: llama3-8b-instruct
    model.aibrix.ai/port: "8000"
    model.aibrix.ai/kv-events-enabled: "true"
spec:
  replicas: 3
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: RollingUpdate
  selector:
    matchLabels:
      model.aibrix.ai/name: llama3-8b-instruct
  template:
    metadata:
      labels:
        model.aibrix.ai/name: llama3-8b-instruct
        model.aibrix.ai/port: "8000"
        model.aibrix.ai/kv-events-enabled: "true"
      annotations:
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
        prometheus.io/scrape: "true"
    spec:
      containers:
        - name: vllm-openai
          image: aibrix-public-release-cn-beijing.cr.volces.com/vllm/vllm-openai:0.11.0
          imagePullPolicy: Always
          command:
            - vllm
            - serve
            - /models/llama-3.1-8b-instruct/
            - --port
            - "8000"
            - --uvicorn-log-level
            - warning
            - --trust-remote-code
            - --served-model-name
            - llama3-8b-instruct
            - --disable-fastapi-docs
          ports:
            - containerPort: 8000
              protocol: TCP
              name: serve
            - containerPort: 5557
              protocol: TCP
              name: kv-events
            - containerPort: 5559
              protocol: TCP
              name: kv-replay
          readinessProbe:
            httpGet:
              path: /health
              port: serve
              scheme: HTTP
            failureThreshold: 5
            periodSeconds: 5
            successThreshold: 1
            timeoutSeconds: 1
          volumeMounts:
            - mountPath: /models
              name: model-hostpath
          resources:
            limits:
              nvidia.com/gpu: "1"
              cpu: "12"
              memory: "48G"
            requests:
              nvidia.com/gpu: "1"
              cpu: "12"
              memory: "48G"
      # nodeSelector:
      #   kubernetes.io/hostname: 192.168.0.7
      volumes:
        - name: model-hostpath
          hostPath:
            path: /data01/models
            type: DirectoryOrCreate

---

apiVersion: v1
kind: Service
metadata:
  labels:
    model.aibrix.ai/name: llama3-8b-instruct
    prometheus-discovery: "true"
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
  name: llama3-8b-instruct # Note: The Service name must match the label value `model.aibrix.ai/name` in the Deployment
  namespace: default
spec:
  ports:
    - name: serve
      port: 8000
      protocol: TCP
      targetPort: 8000
    - name: http
      port: 8080
      protocol: TCP
      targetPort: 8080
    - name: kv-events
      port: 5557
      protocol: TCP
      targetPort: kv-events
    - name: kv-replay
      port: 5559
      protocol: TCP
      targetPort: kv-replay
  selector:
    model.aibrix.ai/name: llama3-8b-instruct
  type: ClusterIP
