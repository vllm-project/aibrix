apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen3-8b
  namespace: default
  labels:
    model.aibrix.ai/name: qwen3-8b
    model.aibrix.ai/port: "8000"
    model.aibrix.ai/kv-events-enabled: "true"
spec:
  replicas: 3
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: RollingUpdate
  selector:
    matchLabels:
      model.aibrix.ai/name: qwen3-8b
  template:
    metadata:
      labels:
        model.aibrix.ai/name: qwen3-8b
        model.aibrix.ai/port: "8000"
        model.aibrix.ai/kv-events-enabled: "true"
      annotations:
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
        prometheus.io/scrape: "true"
    spec:
      initContainers:
        - command:
            - aibrix_download
            - --model-uri
            - tos://aibrix-artifact-testing/models/Qwen3-8B/
            - --local-dir
            - /models/
          env:
            - name: DOWNLOADER_NUM_CONNECTIONS
              value: "16"
            - name: DOWNLOADER_NUM_THREADS
              value: "16"
            - name: DOWNLOADER_ALLOW_FILE_SUFFIX
              value: json, safetensors
            - name: TOS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  key: TOS_ACCESS_KEY
                  name: tos-credential
            - name: TOS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  key: TOS_SECRET_KEY
                  name: tos-credential
            - name: TOS_ENDPOINT
              value: https://tos-s3-cn-beijing.ivolces.com
            - name: TOS_REGION
              value: cn-beijing
          image: aibrix-public-release-cn-beijing.cr.volces.com/aibrix/runtime:v0.5.0
          name: init-model
          volumeMounts:
            - mountPath: /models
              name: model-hostpath
      containers:
        - name: vllm-openai
          image: aibrix-public-release-cn-beijing.cr.volces.com/vllm/vllm-openai:0.11.0
          imagePullPolicy: Always
          command:
            - vllm
            - serve
            - /models/Qwen3-8B/
            - --port
            - "8000"
            - --uvicorn-log-level
            - warning
            - --trust-remote-code
            - --served-model-name
            - qwen3-8b
            - --disable-fastapi-docs
            # vLLM 0.11 enables KV ZMQ via VllmConfig only through --kv-events-config (JSON).
            # Plain VLLM_* env vars for this are not read by upstream vLLM — without this, no publisher runs.
            - --kv-events-config
            - '{"enable_kv_cache_events":true,"publisher":"zmq","endpoint":"tcp://*:5557","replay_endpoint":"tcp://*:5559"}'
          ports:
            - containerPort: 8000
              protocol: TCP
              name: serve
            - containerPort: 5557
              protocol: TCP
              name: kv-events
            - containerPort: 5559
              protocol: TCP
              name: kv-replay
          readinessProbe:
            httpGet:
              path: /health
              port: serve
              scheme: HTTP
            failureThreshold: 5
            periodSeconds: 5
            successThreshold: 1
            timeoutSeconds: 1
          volumeMounts:
            - mountPath: /models
              name: model-hostpath
          resources:
            limits:
              nvidia.com/gpu: "1"
              cpu: "12"
              memory: "48G"
            requests:
              nvidia.com/gpu: "1"
              cpu: "12"
              memory: "48G"
      # nodeSelector:
      #   kubernetes.io/hostname: 192.168.0.7
      volumes:
        - name: model-hostpath
          hostPath:
            path: /root/models
            type: DirectoryOrCreate

---

apiVersion: v1
kind: Service
metadata:
  labels:
    model.aibrix.ai/name: qwen3-8b
    prometheus-discovery: "true"
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
  name: qwen3-8b # Note: The Service name must match the label value `model.aibrix.ai/name` in the Deployment
  namespace: default
spec:
  ports:
    - name: serve
      port: 8000
      protocol: TCP
      targetPort: 8000
    - name: http
      port: 8080
      protocol: TCP
      targetPort: 8080
    - name: kv-events
      port: 5557
      protocol: TCP
      targetPort: kv-events
    - name: kv-replay
      port: 5559
      protocol: TCP
      targetPort: kv-replay
  selector:
    model.aibrix.ai/name: qwen3-8b
  type: ClusterIP
