apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen25omni-7b
spec:
  replicas: 1
  selector:
    matchLabels:
      model.aibrix.ai/name: qwen2-5-omni-7b
  template:
    metadata:
      labels:
        model.aibrix.ai/name: qwen2-5-omni-7b
        model.aibrix.ai/port: "8000"
        model.aibrix.ai/engine: vllm
    spec:
      containers:
        - name: vllm-omni
          image: aibrix/vllm-openai:v0.19.0
          command: ["sh", "-c"]
          args:
            - |
              vllm serve Qwen/Qwen2.5-Omni-7B \
              --host "0.0.0.0" \
              --port "8000" \
              --served-model-name qwen2-5-omni-7b \
              --omni \
              --tensor-parallel-size 4
          resources:
            limits:
              nvidia.com/gpu: 4
            requests:
              nvidia.com/gpu: 4
