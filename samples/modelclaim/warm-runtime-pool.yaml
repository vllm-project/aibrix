apiVersion: apps/v1
kind: Deployment
metadata:
  name: warm-runtime-pool-b300
  namespace: default
  labels:
    pool.aibrix.ai/name: b300-pool-a
    pool.aibrix.ai/enabled: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: warm-runtime-pool-b300
  template:
    metadata:
      labels:
        app: warm-runtime-pool-b300
        pool.aibrix.ai/name: b300-pool-a
        pool.aibrix.ai/enabled: "true"
    spec:
      containers:
        - name: aibrix-runtime
          # This image must be built on a kvcached-enabled vLLM base image.
          # The runtime sidecar starts the per-ModelClaim engine processes.
          image: aibrix/runtime:dev
          imagePullPolicy: IfNotPresent
          # Let the image provide its own runtime entrypoint. This keeps the
          # sample compatible with both the release image and a locally built
          # kvcached-vLLM runtime image.
          ports:
            - name: runtime
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          env:
            - name: AIBRIX_MODEL_RUNTIME_MOCK
              value: "0"
            - name: ENABLE_KVCACHED
              # Keep the sidecar itself unpatched. The launcher sets these
              # values to true only for each child engine process.
              value: "false"
            - name: KVCACHED_AUTOPATCH
              value: "0"
            - name: AIBRIX_WEIGHT_CACHE_DIR
              value: /root/.cache/huggingface
          resources:
            limits:
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
            - name: hf-cache
              mountPath: /root/.cache/huggingface
            - name: engine-registry
              mountPath: /var/run/aibrix
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
        - name: hf-cache
          hostPath:
            path: /var/cache/aibrix/huggingface
            type: DirectoryOrCreate
        - name: engine-registry
          emptyDir: {}
