# Usage:
#   kubectl label node <node-a> topology.kubernetes.io/zone=zone-a --overwrite
#   kubectl label node <node-b> topology.kubernetes.io/zone=zone-b --overwrite
#   kubectl apply -f samples/orchestration/topology-policy/role-zone-preferred.yaml
#   kubectl get pods -l storm-service-name=tp-role-zone-pref -o wide
#
# Case: prefill and decode resource pools prefer separate topology domains by role.
#
# Pods with role=prefill prefer the same zone as other prefill Pods.
# Pods with role=decode prefer the same zone as other decode Pods.
apiVersion: orchestration.aibrix.ai/v1alpha1
kind: StormService
metadata:
  name: tp-role-zone-pref
spec:
  replicas: 3
  stateful: true
  selector:
    matchLabels:
      app: tp-role-zone-pref
  template:
    metadata:
      labels:
        app: tp-role-zone-pref
    spec:
      # updateStrategy=Parallel creates all roles immediately for easier demos.
      updateStrategy: Parallel
      # topologyPolicy injects Kubernetes pod affinity into generated Pods.
      topologyPolicy:
        # scope=Role matches Pods with the same role name across all RoleSets.
        # In this sample, all prefill Pods prefer one zone and all decode Pods
        # prefer one zone.
        scope: Role
        # mode=Preferred is a soft rule. Kubernetes tries to co-locate matching
        # Pods, but can schedule elsewhere when the preferred zone lacks room.
        mode: Preferred
        # key selects the node label used as the topology domain.
        key: topology.kubernetes.io/zone
      roles:
        - name: prefill
          # Two prefill replicas per RoleSet. With podGroupSize=2, each replica
          # is represented by a PodSet containing two Pods.
          replicas: 2
          podGroupSize: 2
          stateful: true
          template:
            metadata:
              labels:
                role: prefill
            spec:
              containers:
                - name: prefill
                  image: nginx:alpine
        - name: decode
          # Four decode Pods per RoleSet. They match scope=Role as decode Pods.
          replicas: 4
          stateful: true
          template:
            metadata:
              labels:
                role: decode
            spec:
              containers:
                - name: decode
                  image: nginx:alpine
