# https://www.callicoder.com/deploy-multi-container-go-redis-app-kubernetes/
{{- if .Values.metadata.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aibrix.fullname" . }}-redis-master
  labels:
    {{- include "aibrix.labels" . | nindent 4 }}
    app.kubernetes.io/component: aibrix-metadata-redis
spec:
  replicas: {{ .Values.metadata.redis.replicas }}
  selector:
    matchLabels:
      {{- include "aibrix.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: aibrix-metadata-redis
  template:
    metadata:
      labels:
        {{- include "aibrix.labels" . | nindent 8 }}
        app.kubernetes.io/component: aibrix-metadata-redis
    spec:
      {{- include "aibrix.imagePullSecrets" (dict "componentSecrets" .Values.metadata.redis.imagePullSecrets "globalSecrets" .Values.global.imagePullSecrets) | nindent 6 }}
      containers:
        - name: master
          image: {{ .Values.metadata.redis.container.image.repository }}:{{ .Values.metadata.redis.container.image.tag }}
          ports:
            - containerPort: 6379
          resources: {{ toYaml .Values.metadata.redis.container.resources | nindent 12 }}
          {{- if include "aibrix.redis.sharedHasPassword" . }}
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "aibrix.fullname" . }}-redis
                  key: {{ include "aibrix.redis.connectionPasswordKey" (dict "component" "redis") }}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  labels:
    {{- include "aibrix.labels" . | nindent 4 }}
    app.kubernetes.io/component: aibrix-metadata-redis
  name: {{ include "aibrix.fullname" . }}-redis-master
spec:
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    {{- include "aibrix.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: aibrix-metadata-redis

{{- end }}

{{- $sharedPassword := .Values.metadata.redis.password -}}
{{- if include "aibrix.redis.anyPasswordsConfigured" . }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aibrix.fullname" . }}-redis
type: Opaque
data:
  {{- if $sharedPassword }}
  redis-password: {{ $sharedPassword | b64enc }}
  {{- end }}
  {{- if .Values.gatewayPlugin.dependencies.redis.password }}
  gateway-plugin-redis-password: {{ .Values.gatewayPlugin.dependencies.redis.password | b64enc }}
  {{- else if $sharedPassword }}
  gateway-plugin-redis-password: {{ $sharedPassword | b64enc }}
  {{- end }}
  {{- if .Values.gpuOptimizer.dependencies.redis.password }}
  gpu-optimizer-redis-password: {{ .Values.gpuOptimizer.dependencies.redis.password | b64enc }}
  {{- else if $sharedPassword }}
  gpu-optimizer-redis-password: {{ $sharedPassword | b64enc }}
  {{- end }}
  {{- if .Values.metadata.service.redis.password }}
  metadata-service-redis-password: {{ .Values.metadata.service.redis.password | b64enc }}
  {{- else if $sharedPassword }}
  metadata-service-redis-password: {{ $sharedPassword | b64enc }}
  {{- end }}
{{- end }}
