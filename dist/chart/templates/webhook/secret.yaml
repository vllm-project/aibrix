{{- if .Values.webhook.enable }}
{{- $svcName := printf "%s-webhook-service.%s.svc" (include "aibrix.fullname" .) .Release.Namespace }}
{{- $ca := genCA "aibrix-ca" 3650 }}
{{- $cert := genSignedCert $svcName nil (list $svcName (printf "%s.cluster.local" $svcName)) 3650 $ca }}
apiVersion: v1
kind: Secret
metadata:
  labels:
    {{- include "aibrix.labels" . | nindent 4 }}
    app.kubernetes.io/component: aibrix-controller-manager
  name: aibrix-webhook-server-cert
type: kubernetes.io/tls
data:
  tls.crt: {{ $cert.Cert | b64enc }}
  tls.key: {{ $cert.Key | b64enc }}
{{- end }}
