{{- $bearerToken := dig "auth" "bearerToken" "" .Values.gatewayPlugin -}}
{{- if $bearerToken }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aibrix.fullname" . }}-gateway-plugin-auth
  labels:
    {{- include "aibrix.labels" . | nindent 4 }}
    app.kubernetes.io/component: aibrix-gateway-plugin
type: Opaque
data:
  bearer-token: {{ $bearerToken | b64enc }}
{{- end }}
