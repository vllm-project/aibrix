apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: aibrix-controller-manager
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/name: aibrix
    app.kubernetes.io/version: nightly
    control-plane: controller-manager
  name: aibrix-controller-manager
  namespace: aibrix-system
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
    spec:
      containers:
      - args:
        - --leader-elect
        - --health-probe-bind-address=:8081
        - --metrics-bind-address=:8080
        - --enable-runtime-sidecar
        command:
        - /manager
        env:
        - name: AIBRIX_GATEWAY_TIMEOUT_SECONDS
          value: "120"
        image: aibrix/controller-manager:v0.6.0
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports:
        - containerPort: 9443
          name: webhook-server
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          name: cert
          readOnly: true
      securityContext:
        runAsNonRoot: true
      serviceAccountName: aibrix-controller-manager
      terminationGracePeriodSeconds: 10
      volumes:
      - name: cert
        secret:
          defaultMode: 420
          secretName: aibrix-webhook-server-cert
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: aibrix-gateway-plugin
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/name: aibrix
    app.kubernetes.io/version: nightly
  name: aibrix-gateway-plugins
  namespace: aibrix-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-plugins
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: gateway-plugins
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - preference:
              matchExpressions:
              - key: nvidia.com/gpu.present
                operator: NotIn
                values:
                - "true"
            weight: 100
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - gateway-plugins
              topologyKey: kubernetes.io/hostname
            weight: 100
      containers:
      - env:
        - name: AIBRIX_GPU_OPTIMIZER_TRACING_FLAG
          value: "false"
        - name: AIBRIX_PREFIX_CACHE_TOKENIZER_TYPE
          value: character
        - name: AIBRIX_PREFIX_CACHE_BLOCK_SIZE
          value: "128"
        - name: AIBRIX_PREFIX_CACHE_BLOCK_NUMBER
          value: "200000"
        - name: AIBRIX_PREFIX_CACHE_POD_RUNNING_REQUEST_IMBALANCE_ABS_COUNT
          value: "16"
        - name: AIBRIX_PREFIX_CACHE_STANDARD_DEVIATION_FACTOR
          value: "2"
        - name: REDIS_HOST
          value: aibrix-redis-master
        - name: REDIS_PORT
          value: "6379"
        - name: AIBRIX_POD_METRIC_REFRESH_INTERVAL_MS
          value: "50"
        - name: AIBRIX_PREFILL_REQUEST_TIMEOUT
          value: "60"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        image: aibrix/gateway-plugins:v0.6.0
        imagePullPolicy: IfNotPresent
        livenessProbe:
          grpc:
            port: 50052
          initialDelaySeconds: 5
          periodSeconds: 10
        name: gateway-plugin
        ports:
        - containerPort: 50052
          name: gateway
        - containerPort: 6060
          name: profiling
        - containerPort: 8080
          name: metrics
        readinessProbe:
          grpc:
            port: 50052
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: "2"
            memory: 8Gi
          requests:
            cpu: "2"
            memory: 8Gi
      initContainers:
      - command:
        - sh
        - -c
        - until echo "ping" | nc aibrix-redis-master 6379 -w 1  | grep -c PONG; do
          echo waiting for service aibrix-redis-master; sleep 2; done
        image: busybox:stable
        name: init-c
      serviceAccountName: aibrix-gateway-plugins
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: aibrix-gpu-optimizer
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/name: aibrix
    app.kubernetes.io/version: nightly
