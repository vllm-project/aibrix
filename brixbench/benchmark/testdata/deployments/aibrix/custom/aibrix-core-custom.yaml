        - name: REDIS_HOST
          value: aibrix-redis-master.aibrix-system.svc.cluster.local
        image: aibrix/metadata-service:v0.6.0
        name: gpu-optimizer
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 10m
            memory: 64Mi
      serviceAccountName: aibrix-gpu-optimizer-sa
