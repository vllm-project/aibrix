    \ namespace: default\nspec:\n  parallelism: 1 # Customizable. The number of parallel
    workers.\n  completions: 1 # Customizable. Must equal to the parallelism.\n  backoffLimit:
    2 # Customizable, but usually no need to change.\n  template:\n    spec:\n      containers:\n
    \     - name: batch-worker\n        image: aibrix/runtime:nightly # Customizable,
    batch job worker image\n      - name: llm-engine\n        image: aibrix/vllm-mock:nightly
    # Customizable, customize your LLM engine image\n        # command: [\"/bin/sh\",
    \"-c\"] # Customization is not recommended. Know what you are doing.\n        args:
    # Customizable in the format of \"WORKER_VICTIM=1 [your command] || true\"\n          -
    |\n            # Run llm engine. \n            # 'WORKER_VICTIM=1' helps the batch-worker
    to identify llm-engine process.\n            # '|| true' at the end ensures the
    container llm-engine never fails.\n            WORKER_VICTIM=1 python app.py ||
    true\n        readinessProbe: # Customizable, customize your readinessProbe"
