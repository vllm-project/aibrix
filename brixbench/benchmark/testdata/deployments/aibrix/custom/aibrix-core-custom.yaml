apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: kuberay-operator
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/name: aibrix
    app.kubernetes.io/version: nightly
    helm.sh/chart: kuberay-operator-1.2.1
  name: aibrix-kuberay-operator
  namespace: aibrix-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: kuberay-operator
      app.kubernetes.io/name: kuberay-operator
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/component: kuberay-operator
        app.kubernetes.io/instance: kuberay-operator
        app.kubernetes.io/name: kuberay-operator
    spec:
      containers:
      - args:
        - --feature-gates=RayClusterStatusConditions=true
        - --enable-leader-election=true
        command:
        - /manager
        env:
        - name: ENABLE_PROBES_INJECTION
          value: "false"
        image: aibrix/kuberay-operator:v1.2.1-patch-20250726
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 5
          httpGet:
            path: /metrics
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
        name: kuberay-operator
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        readinessProbe:
          failureThreshold: 5
          httpGet:
            path: /metrics
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          limits:
            cpu: 100m
            memory: 512Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
      securityContext: {}
      serviceAccountName: aibrix-kuberay-operator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: aibrix-metadata-service
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/name: aibrix
    app.kubernetes.io/version: nightly
  name: aibrix-metadata-service
  namespace: aibrix-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metadata-service
  template:
    metadata:
      labels:
        app: metadata-service
    spec:
      containers:
      - command:
        - aibrix_metadata
        - --host
        - 0.0.0.0
        - --port
        - "8090"
        env:
        - name: REDIS_HOST
          value: aibrix-redis-master
        - name: REDIS_PORT
          value: "6379"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        image: aibrix/metadata-service:v0.6.0
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8090
          initialDelaySeconds: 10
          periodSeconds: 10
        name: metadata-service
        ports:
        - containerPort: 8090
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8090
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 50m
            memory: 128Mi
        volumeMounts:
        - mountPath: /app/config
          name: config-volume
          readOnly: true
      initContainers:
      - command:
        - sh
        - -c
        - until echo "ping" | nc aibrix-redis-master 6379 -w 1 | grep -c PONG; do
          echo waiting for redis; sleep 2; done
        image: busybox:stable
        name: init-redis
      serviceAccountName: aibrix-aibrix-metadata-service
      volumes:
      - configMap:
          name: aibrix-metadata-config-94mt294mm8
        name: config-volume
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: redis
    app.kubernetes.io/component: aibrix-metadata-service
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/name: aibrix
    app.kubernetes.io/version: nightly
  name: aibrix-redis-master
  namespace: aibrix-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
      role: master
      tier: backend
  template:
    metadata:
      labels:
        app: redis
        role: master
        tier: backend
    spec:
      containers:
      - image: redis:latest
        name: master
        ports:
        - containerPort: 6379
        resources:
          requests:
            cpu: 100m
            memory: 100Mi
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gateway-plugins-pdb
  namespace: aibrix-system
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: gateway-plugins
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  labels:
    app.kubernetes.io/component: aibrix-gateway-plugin
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/name: aibrix
    app.kubernetes.io/version: nightly
  name: aibrix-client-connection-buffersize
  namespace: aibrix-system
spec:
  connection:
    bufferLimit: 4194304
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: aibrix-eg
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  labels:
    app.kubernetes.io/component: aibrix-gateway-plugin
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/name: aibrix
    app.kubernetes.io/version: nightly
  name: aibrix-gateway-plugins-extension-policy
  namespace: aibrix-system
spec:
  extProc:
  - backendRefs:
    - name: aibrix-gateway-plugins
      port: 50052
    messageTimeout: 60s
    processingMode:
      request:
        body: Buffered
      response:
        body: Streamed
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: aibrix-reserved-router
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  labels:
    app.kubernetes.io/component: aibrix-gateway-plugin
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/name: aibrix
    app.kubernetes.io/version: nightly
  name: aibrix-skip-ext-proc
  namespace: aibrix-system
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: aibrix-reserved-router-metadata-endpoint
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyPatchPolicy
metadata:
  labels:
    app.kubernetes.io/component: aibrix-gateway-plugin
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/name: aibrix
    app.kubernetes.io/version: nightly
  name: aibrix-epp
  namespace: aibrix-system
spec:
  jsonPatches:
  - name: aibrix-system/aibrix-eg/http
    operation:
      op: add
      path: /virtual_hosts/0/routes/0
      value:
        match:
          headers:
          - name: routing-strategy
            string_match:
              safe_regex:
                regex: .*
          prefix: /
        name: original_route
        route:
          cluster: original_destination_cluster
          timeout: 120s
        typed_per_filter_config:
          envoy.filters.http.ext_proc/envoyextensionpolicy/aibrix-system/aibrix-gateway-plugins-extension-policy/extproc/0:
            '@type': type.googleapis.com/envoy.config.route.v3.FilterConfig
            config: {}
    type: type.googleapis.com/envoy.config.route.v3.RouteConfiguration
  - name: envoy-patch-policy-override2
    operation:
      op: add
      path: ""
      value:
        connect_timeout: 6s
        dns_lookup_family: V4_ONLY
        lb_policy: CLUSTER_PROVIDED
        name: original_destination_cluster
        original_dst_lb_config:
          http_header_name: target-pod
          use_http_header: true
        type: ORIGINAL_DST
    type: type.googleapis.com/envoy.config.cluster.v3.Cluster
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: aibrix-eg
  type: JSONPatch
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  labels:
    app.kubernetes.io/component: aibrix-gateway-plugin
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/name: aibrix
    app.kubernetes.io/version: nightly
  name: aibrix-custom-proxy-config
  namespace: aibrix-system
spec:
  provider:
    kubernetes:
      envoyDeployment:
        patch:
          type: StrategicMerge
          value:
            spec:
              template:
                spec:
                  containers:
                  - image: envoyproxy/envoy:v1.33.2
                    name: envoy
                    resources:
                      limits:
                        cpu: 2
                        memory: 8Gi
                      requests:
                        cpu: 2
                        memory: 8Gi
                  - image: envoyproxy/gateway:v1.2.8
                    name: shutdown-manager
        pod:
          affinity:
            nodeAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
              - preference:
                  matchExpressions:
                  - key: nvidia.com/gpu.present
                    operator: NotIn
                    values:
                    - "true"
                weight: 100
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
              - podAffinityTerm:
                  labelSelector:
                    matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                      - envoy
                  topologyKey: kubernetes.io/hostname
                weight: 100
        replicas: 1
        strategy:
          rollingUpdate:
            maxSurge: 1
            maxUnavailable: 1
          type: RollingUpdate
      envoyPDB:
        minAvailable: 1
    type: Kubernetes
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  labels:
    app.kubernetes.io/component: aibrix-gateway-plugin
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/name: aibrix
    app.kubernetes.io/version: nightly
  name: aibrix-eg
  namespace: aibrix-system
spec:
  gatewayClassName: aibrix-eg
  listeners:
