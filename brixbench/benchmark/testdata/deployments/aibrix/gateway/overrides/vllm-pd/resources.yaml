# Draft Gateway API resources for the current vLLM PD benchmark model.
apiVersion: v1
kind: Service
metadata:
  name: vllm-pd-svc
  namespace: brixbench-adhoc
  labels:
    model.aibrix.ai/name: qwen3-8b
spec:
  selector:
    model.aibrix.ai/name: qwen3-8b
    model.aibrix.ai/engine: vllm
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: aibrix-system-to-vllm-pd-svc
  namespace: brixbench-adhoc
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: aibrix-system
  to:
    - group: ""
      kind: Service
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vllm-pd-router
  namespace: aibrix-system
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: aibrix-eg
      namespace: aibrix-system
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: vllm-pd-svc
          namespace: brixbench-adhoc
          port: 8000
          weight: 1
      matches:
        - headers:
            - name: model
              type: Exact
              value: qwen3-8b
          path:
            type: PathPrefix
            value: /v1/completions
        - headers:
            - name: model
              type: Exact
              value: qwen3-8b
          path:
            type: PathPrefix
            value: /v1/chat/completions
      timeouts:
        request: 120s
