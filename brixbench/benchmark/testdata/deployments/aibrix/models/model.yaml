apiVersion: v1
kind: Service
metadata:
  name: qwen3-32b
  namespace: brixbench-adhoc
  labels:
    deployment: "monolithic"
    engine: "vllm"
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    storm-service-name: qwen3-32b
  ports:
    - name: serve
      protocol: TCP
      port: 8000
      targetPort: 8000
---
apiVersion: orchestration.aibrix.ai/v1alpha1
kind: StormService
metadata:
  name: qwen3-32b
  namespace: brixbench-adhoc
  labels:
    engine: "vllm"
    deployment: "monolithic"
spec:
  replicas: 1
  updateStrategy:
    type: InPlaceUpdate
  stateful: true
  selector:
    matchLabels:
      app: qwen3-32b
  template:
    metadata:
      labels:
        app: qwen3-32b
    spec:
      roles:
        - name: server
          replicas: 2
          stateful: true
          template:
            metadata:
              annotations:
                k8s.volcengine.com/pod-networks: |
                  [
                    {
                      "cniConf":{
                          "name":"rdma"
                      }
                    }
                  ]
              labels:
                model.aibrix.ai/name: qwen3-32b
                model.aibrix.ai/port: "8000"
                model.aibrix.ai/engine: vllm
            spec:
              affinity:
                podAntiAffinity:
                  requiredDuringSchedulingIgnoredDuringExecution:
                    - labelSelector:
                        matchExpressions:
                          - key: app
                            operator: In
                            values:
                              - qwen3-32b
                      topologyKey: kubernetes.io/hostname
              containers:
                - name: server
                  image: aibrix-container-registry-cn-beijing.cr.volces.com/aibrix/vllm-openai-aibrix-kvcache-nixl:v0.10.2-nixl-0.7.1-ucx-1.19.0
                  command: ["sh", "-c"]
                  args:
                    - |
                      python3 -m vllm.entrypoints.openai.api_server \
                        --host "0.0.0.0" \
                        --port "8000" \
                        --uvicorn-log-level warning \
                        --model /models/Qwen3-32B \
                        --served-model-name qwen3-32b \
                        --disable-log-requests \
                        --no-enable-chunked-prefill \
                        --max-model-len 40960 \
                        --tensor-parallel-size=4
                  env:
                    - name: UCX_TLS
                      value: "^gga"
                    - name: GLOO_SOCKET_IFNAME
                      value: "eth0"
                    - name: NCCL_SOCKET_IFNAME
                      value: "eth0"
                    - name: NCCL_IB_DISABLE
                      value: "0"
                    - name: NCCL_IB_GID_INDEX
                      value: "7"
                    - name: NCCL_DEBUG
                      value: "INFO"
                    - name: PYTHONHASHSEED
                      value: "1047"
                    - name: VLLM_SERVER_DEV_MODE
                      value: "1"
                    - name: VLLM_USE_V1
                      value: "1"
                    - name: VLLM_ENABLE_V1_MULTIPROCESSING
                      value: "1"
                    - name: VLLM_WORKER_MULTIPROC_METHOD
                      value: "spawn"
                    - name: UCX_LOG_LEVEL
                      value: info
                    - name: NIXL_LOG_LEVEL
                      value: info
                    - name: VLLM_LOGGING_LEVEL
                      value: info
                  volumeMounts:
                    - name: model-vol
                      mountPath: /models
                      readOnly: true
                    - mountPath: /dev/shm
                      name: shared-mem
                  startupProbe:
                    httpGet:
                      path: /health
                      port: 8000
                    periodSeconds: 5
                    timeoutSeconds: 2
                    failureThreshold: 180
                  readinessProbe:
                    httpGet:
                      path: /health
                      port: 8000
                    periodSeconds: 5
                    timeoutSeconds: 2
                    failureThreshold: 3
                  resources:
                    limits:
                      nvidia.com/gpu: 4
                      vke.volcengine.com/rdma: "1"
                    requests:
                      nvidia.com/gpu: 4
                  securityContext:
                    capabilities:
                      add:
                        - IPC_LOCK
              volumes:
                - name: model-vol
                  hostPath:
                    path: /data01/models
                    type: Directory
                - emptyDir:
                    medium: Memory
                  name: shared-mem
