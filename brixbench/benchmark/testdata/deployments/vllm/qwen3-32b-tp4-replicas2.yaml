apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-basic
  namespace: brixbench-adhoc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vllm-basic
  template:
    metadata:
      labels:
        app: vllm-basic
        model: qwen3-32b
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: vllm-basic
              topologyKey: kubernetes.io/hostname
      containers:
        - name: server
          image: aibrix-container-registry-cn-beijing.cr.volces.com/aibrix/vllm-openai-aibrix-kvcache-nixl:v0.10.2-nixl-0.7.1-ucx-1.19.0
          command: ["sh", "-c"]
          args:
            - |
              python3 -m vllm.entrypoints.openai.api_server \
                --host 0.0.0.0 \
                --port 8000 \
                --uvicorn-log-level warning \
                --model /models/Qwen3-32B \
                --served-model-name qwen3-32b \
                --disable-log-requests \
                --no-enable-chunked-prefill \
                --max-model-len 40960 \
                --tensor-parallel-size 4
          env:
            - name: UCX_TLS
              value: "^gga"
            - name: GLOO_SOCKET_IFNAME
              value: "eth0"
            - name: NCCL_SOCKET_IFNAME
              value: "eth0"
            - name: NCCL_IB_DISABLE
              value: "0"
            - name: NCCL_IB_GID_INDEX
              value: "7"
            - name: NCCL_DEBUG
              value: "INFO"
            - name: PYTHONHASHSEED
              value: "1047"
            - name: VLLM_SERVER_DEV_MODE
              value: "1"
            - name: VLLM_USE_V1
              value: "1"
            - name: VLLM_ENABLE_V1_MULTIPROCESSING
              value: "1"
            - name: VLLM_WORKER_MULTIPROC_METHOD
              value: "spawn"
            - name: UCX_LOG_LEVEL
              value: "info"
            - name: NIXL_LOG_LEVEL
              value: "info"
            - name: VLLM_LOGGING_LEVEL
              value: "info"
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            limits:
              nvidia.com/gpu: 4
            requests:
              nvidia.com/gpu: 4
          volumeMounts:
            - name: model-vol
              mountPath: /models
              readOnly: true
            - name: shared-mem
              mountPath: /dev/shm
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
      volumes:
        - name: model-vol
          hostPath:
            path: /data01/models
            type: Directory
        - name: shared-mem
          emptyDir:
            medium: Memory
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-service
  namespace: brixbench-adhoc
spec:
  sessionAffinity: None
  selector:
    app: vllm-basic
  ports:
    - name: http
      port: 8000
      targetPort: http
